<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>typstr</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app" data-panel="preview" data-files="open">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">t</span>
          <span class="brand-name">typstr</span>
          <span class="file-name" id="fileName">untitled.typ</span>
        </div>
        <nav class="toolbar" aria-label="Primary">
          <button class="icon-button" id="openButton" title="Open file (Cmd/Ctrl+O)" aria-label="Open file">Open</button>
          <button class="icon-button" id="saveButton" title="Save file (Cmd/Ctrl+S)" aria-label="Save file">Save</button>
          <button class="icon-button" id="paletteButton" title="Command palette (Cmd/Ctrl+K)" aria-label="Command palette">Command</button>
          <button class="icon-button" id="settingsButton" title="Settings (Cmd/Ctrl+,)" aria-label="Settings">Settings</button>
        </nav>
      </header>

      <main class="workspace">
        <aside class="side-panel" id="sidePanel" data-active-tab="files" aria-label="Sidebar">
          <div class="side-tabs" role="tablist" aria-label="Sidebar tabs">
            <button id="filesTabButton" class="side-tab active" role="tab" aria-selected="true" title="Files">Files</button>
          </div>
          <section class="file-manager" id="fileManager" role="tabpanel" aria-label="Files">
            <div class="pane-header">
              <span>Files</span>
              <div class="segmented" aria-label="File controls">
                <button id="addFilesButton" title="Add files">Add</button>
                <button id="openFolderButton" title="Open folder">Folder</button>
              </div>
            </div>
            <div class="file-list" id="fileList" aria-label="Loaded files"></div>
          </section>
        </aside>

        <section class="pane editor-pane" aria-label="Typst editor">
          <div class="pane-header">
            <span>Editor</span>
            <div class="segmented" aria-label="Formatting">
              <button id="boldButton" title="Bold selection">B</button>
              <button id="italicButton" title="Italic selection">I</button>
              <button id="commentButton" title="Toggle line comment">//</button>
            </div>
          </div>
          <div class="editor-shell">
            <pre class="line-numbers" id="lineNumbers" aria-hidden="true">1</pre>
            <textarea
              id="editor"
              spellcheck="false"
              autocomplete="off"
              autocapitalize="off"
              aria-label="Typst source editor"
            ></textarea>
          </div>
        </section>

        <section class="pane preview-pane" aria-label="Live preview">
          <div class="pane-header">
            <span>Preview</span>
            <div class="segmented" aria-label="Preview controls">
              <button id="zoomOutButton" title="Zoom out">-</button>
              <button id="zoomInButton" title="Zoom in">+</button>
              <button id="printButton" title="Print or save PDF">PDF</button>
            </div>
          </div>
          <div class="preview-scroller" id="previewScroller" tabindex="0">
            <article class="paper" id="preview"></article>
          </div>
        </section>

        <aside class="settings-panel" id="settingsPanel" aria-label="Settings">
          <div class="pane-header">
            <span>Settings</span>
            <button class="icon-button slim" id="closeSettingsButton" title="Close settings" aria-label="Close settings">Close</button>
          </div>
          <label class="field">
            <span>Theme</span>
            <select id="themeSelect">
              <option value="light">Light</option>
              <option value="dark">Dark</option>
              <option value="paper">Paper</option>
              <option value="custom">Custom</option>
            </select>
          </label>
          <label class="field">
            <span>Editor font size</span>
            <input id="fontSizeInput" type="number" min="12" max="28" step="1">
          </label>
          <label class="field">
            <span>Preview debounce (ms)</span>
            <input id="debounceInput" type="number" min="60" max="1200" step="20">
          </label>
          <label class="field">
            <span>Preview position</span>
            <select id="previewPositionSelect">
              <option value="right">Right of editor</option>
              <option value="left">Left of editor</option>
            </select>
          </label>
          <label class="field stretch">
            <span>Configuration JSON</span>
            <textarea id="configEditor" spellcheck="false"></textarea>
          </label>
          <div class="settings-actions">
            <button id="applyConfigButton">Apply</button>
            <button id="resetConfigButton">Reset</button>
          </div>
        </aside>
      </main>

      <footer class="statusbar">
        <span id="statusText">Ready</span>
        <span id="diagnosticsText">No diagnostics</span>
        <span id="statsText">0 words</span>
      </footer>
    </div>

    <dialog class="palette" id="palette">
      <input id="paletteInput" type="search" placeholder="Run a command" aria-label="Command search">
      <div class="palette-list" id="paletteList"></div>
    </dialog>

    <input id="fileInput" type="file" accept=".typ,text/plain" hidden>
    <input id="fileCollectionInput" type="file" accept=".typ,text/plain" multiple hidden>

    <script src="./app.js"></script>
  </body>
</html>
